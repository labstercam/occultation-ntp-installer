; Meinberg automatic install template for this guided installer.
; The script copies this file to %TEMP% and overrides machine-specific keys:
;   [Installer] InstallDir, UpgradeMode, Logfile, Silent
;   [Service] ServiceAccount
;   [Configuration] UseConfigFile

[Installer]
InstallDir=C:\Program Files (x86)\NTP
UpgradeMode=Reinstall
Logfile=C:\Windows\Temp\meinberg_uam.log
Silent=Yes

[Components]
InstallDocs=yes
InstallTools=yes
InstallOpenSSL=yes
CreateStartMenuEntries=yes

[Service]
ModifyFirewall=yes
ServiceAccount=@SYSTEM
DisableOthers=yes
AllowBigInitialTimestep=yes
EnableMMTimer=yes
AutoStart=yes
StartAfterInstallation=yes

[Configuration]
UseConfigFile=C:\Windows\Temp\ntp_placeholder.conf
